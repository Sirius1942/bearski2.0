# 领星 ERP 操作脚本 - 查询订单

name: "查询订单"
description: "根据订单号或日期范围查询订单"
tags: ["order", "query"]

steps:
  - action: navigate
    url: "https://erp.lingxing.com/erp/orderList"
    description: "进入订单列表"
  
  - action: type
    selector: "input[placeholder*='订单号']"
    text: "{{order_id}}"
    description: "输入订单号"
  
  - action: click
    selector: "button:has-text('搜索')"
    description: "点击搜索"
  
  - action: wait
    seconds: 2
    description: "等待搜索结果"
  
  - action: click
    selector: "tr:has-text('{{order_id}}')"
    description: "点击订单查看详情"

variables:
  order_id: "123456789"
